<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>氣球小V：派對島大作戰</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 直式遮罩：手機直拿時顯示提示 -->
  <div id="portrait-mask">
    <div id="portrait-msg">
      <div style="font-size:48px;margin-bottom:16px;">📱↔️</div>
      <div>請旋轉手機橫向遊玩</div>
      <div style="font-size:13px;opacity:0.6;margin-top:8px;">或點擊下方進入全螢幕</div>
      <button id="btn-fullscreen-portrait" class="fs-btn" style="margin-top:20px;">
        ⛶ 全螢幕遊玩
      </button>
    </div>
  </div>

  <!-- 全螢幕按鈕列（遊戲上方，非全螢幕時顯示） -->
  <div id="fullscreen-bar">
    <button id="btn-fullscreen" class="fs-btn">⛶ 全螢幕</button>
  </div>

  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- 結算畫面 overlay -->
    <div id="result-overlay">
      <div id="result-panel">
        <div id="result-panel-title">關卡結算</div>
        <div id="result-panel-body"></div>
        <div id="result-action-bar">
          <button id="btn-play-again" class="result-btn result-btn--primary">
            再玩一次<span class="result-btn-sub">Play Again</span>
          </button>
          <button id="btn-guidebook" class="result-btn result-btn--guide">
            氣球秘笈<span class="result-btn-sub">Guidebook</span>
          </button>
          <button id="btn-result-reset" class="result-btn result-btn--danger">
            清除背包<span class="result-btn-sub">Reset</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 氣球秘笈 overlay -->
    <div id="guidebook-overlay">
      <div id="guidebook-panel">
        <div id="guidebook-header">
          <span id="guidebook-title">📖 氣球秘笈</span>
          <button id="btn-close-guidebook">✕</button>
        </div>
        <div id="craft-message"></div>
        <div id="guidebook-recipe-list"></div>
      </div>
    </div>

    <!-- 手機操作按鈕 -->
    <div id="mobile-controls">
      <div id="ctrl-left-group">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
      </div>
      <div id="ctrl-right-group">
        <button class="ctrl-btn" id="btn-jump">跳</button>
        <button class="ctrl-btn action-btn" id="btn-attack">🎈</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
  // ─────────────────────────────────────────────
  //  全螢幕 + 遊戲容器尺寸管理
  // ─────────────────────────────────────────────

  const ASPECT = 16 / 9;
  const wrapper = document.getElementById('game-wrapper');
  const fsBar   = document.getElementById('fullscreen-bar');
  const btnFS   = document.getElementById('btn-fullscreen');
  const btnFSPortrait = document.getElementById('btn-fullscreen-portrait');

  // ── 計算並套用 16:9 最大尺寸 ──────────────────
  function resizeGame() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    let w, h;
    if (vw / vh > ASPECT) {
      // 視窗比 16:9 更寬 → 以高度為基準
      h = vh;
      w = h * ASPECT;
    } else {
      // 視窗比 16:9 更窄 → 以寬度為基準
      w = vw;
      h = w / ASPECT;
    }

    wrapper.style.width  = w + 'px';
    wrapper.style.height = h + 'px';
    // 清除 max-width / max-height（改用 JS 控制）
    wrapper.style.maxWidth  = 'none';
    wrapper.style.maxHeight = 'none';
  }

  // ── 判斷目前是否在全螢幕 ──────────────────────
  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }

  // ── 進入全螢幕 ────────────────────────────────
  function enterFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen
              || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});
    // 嘗試鎖定橫向（不支援時靜默失敗）
    try {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    } catch (e) {}
  }

  // ── 離開全螢幕 ────────────────────────────────
  function exitFullscreen() {
    const exit = document.exitFullscreen || document.webkitExitFullscreen
               || document.mozCancelFullScreen || document.msExitFullscreen;
    if (exit) exit.call(document).catch(() => {});
  }

  // ── 全螢幕按鈕點擊：進入 / 離開切換 ──────────
  function onFullscreenBtnClick() {
    if (isFullscreen()) {
      exitFullscreen();
    } else {
      enterFullscreen();
    }
  }

  btnFS.addEventListener('click', onFullscreenBtnClick);
  btnFSPortrait.addEventListener('click', enterFullscreen);

  // ── fullscreenchange：更新按鈕文字 + 重算尺寸 ─
  function onFullscreenChange() {
    if (isFullscreen()) {
      btnFS.textContent = '✕ 離開全螢幕';
    } else {
      btnFS.textContent = '⛶ 全螢幕';
    }
    resizeGame();
    checkOrientation();
  }

  document.addEventListener('fullscreenchange',       onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);
  document.addEventListener('mozfullscreenchange',    onFullscreenChange);
  document.addEventListener('MSFullscreenChange',     onFullscreenChange);

  // ── 直式遮罩：手機直拿時顯示 ──────────────────
  const portraitMask = document.getElementById('portrait-mask');

  function checkOrientation() {
    const isTouch   = navigator.maxTouchPoints > 0;
    const isPortrait = window.innerHeight > window.innerWidth;
    const inFS      = isFullscreen();

    // 直式遮罩：觸控裝置 + 直式 + 非全螢幕時顯示
    if (portraitMask) {
      portraitMask.style.display = (isTouch && isPortrait && !inFS) ? 'flex' : 'none';
    }
    // 全螢幕列：非全螢幕時顯示（CSS :fullscreen 也會隱藏它，雙重保險）
    if (fsBar) {
      fsBar.style.display = inFS ? 'none' : 'flex';
    }
  }

  // ── resize / orientationchange 時重算 ─────────
  window.addEventListener('resize', () => { resizeGame(); checkOrientation(); });
  window.addEventListener('orientationchange', () => {
    // orientationchange 後稍等 200ms 讓瀏覽器完成旋轉
    setTimeout(() => { resizeGame(); checkOrientation(); }, 200);
  });

  // ── 初始化 ────────────────────────────────────
  resizeGame();
  checkOrientation();
  </script>
</body>
</html>
