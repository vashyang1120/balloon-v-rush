<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>氣球小V：派對島大作戰</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- 結算畫面按鈕 overlay（JS 控制顯示/隱藏） -->
    <div id="result-buttons">
      <button id="btn-play-again" class="result-btn result-btn--primary">
        再玩一次
        <span class="result-btn-sub">Play Again</span>
      </button>
      <button id="btn-result-reset" class="result-btn result-btn--danger">
        清除背包資料
        <span class="result-btn-sub">Reset Inventory</span>
      </button>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls">
      <div id="ctrl-left-group">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
      </div>
      <div id="ctrl-right-group">
        <button class="ctrl-btn" id="btn-jump">跳</button>
        <button class="ctrl-btn action-btn" id="btn-attack">🎈</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
