<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>氣球小V：派對島大作戰</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 直式遮罩：手機直拿時顯示 -->
  <div id="portrait-mask">
    <div id="portrait-msg">
      <div style="font-size:48px;margin-bottom:16px;">📱↔️</div>
      <div>請旋轉手機橫向遊玩</div>
      <div style="font-size:13px;opacity:0.6;margin-top:8px;">或點擊下方進入全螢幕</div>
      <button id="btn-fullscreen-portrait" class="fs-btn" style="margin-top:20px;">
        ⛶ 全螢幕遊玩
      </button>
    </div>
  </div>

  <!-- 右上角按鈕列（桌機 / 非全螢幕時顯示） -->
  <div id="top-bar">
    <button id="btn-pause"      class="top-btn">Ⅱ 暫停</button>
    <button id="btn-fullscreen" class="top-btn">⛶ 全螢幕</button>
  </div>

  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- 遊戲內右上角按鈕（全螢幕時用，疊在 Canvas 上） -->
    <div id="ingame-top-bar">
      <button id="btn-pause-ingame"  class="ingame-top-btn">Ⅱ</button>
      <button id="btn-fs-ingame"     class="ingame-top-btn">×FS</button>
    </div>

    <!-- 暫停 overlay -->
    <div id="pause-overlay">
      <div id="pause-panel">
        <div id="pause-title">⏸ 遊戲暫停</div>
        <div id="pause-actions">
          <button id="btn-resume"        class="pause-btn pause-btn--primary">▶ 繼續遊戲</button>
          <button id="btn-pause-restart" class="pause-btn pause-btn--secondary">↺ 重新開始</button>
        </div>
        <div id="pause-hint">按 ESC 也可繼續</div>
      </div>
    </div>

    <!-- 結算畫面 overlay -->
    <div id="result-overlay">
      <div id="result-panel">
        <div id="result-panel-title">關卡結算</div>
        <div id="result-panel-body"></div>
        <div id="result-action-bar">
          <button id="btn-play-again"   class="result-btn result-btn--primary">
            再玩一次<span class="result-btn-sub">Play Again</span>
          </button>
          <button id="btn-guidebook"    class="result-btn result-btn--guide">
            氣球秘笈<span class="result-btn-sub">Guidebook</span>
          </button>
          <button id="btn-result-reset" class="result-btn result-btn--danger">
            清除背包<span class="result-btn-sub">Reset</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 氣球秘笈 overlay -->
    <div id="guidebook-overlay">
      <div id="guidebook-panel">
        <div id="guidebook-header">
          <span id="guidebook-title">📖 氣球秘笈</span>
          <button id="btn-close-guidebook">✕</button>
        </div>
        <div id="craft-message"></div>
        <div id="guidebook-recipe-list"></div>
      </div>
    </div>

    <!-- 手機操作按鈕 -->
    <div id="mobile-controls">
      <div id="ctrl-left-group">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
      </div>
      <div id="ctrl-right-group">
        <button class="ctrl-btn" id="btn-jump">跳</button>
        <button class="ctrl-btn action-btn" id="btn-attack">🎈</button>
      </div>
    </div>
  </div><!-- /#game-wrapper -->

  <script src="main.js"></script>
  <script>
  // ─────────────────────────────────────────────
  //  全螢幕 + 遊戲容器尺寸管理
  // ─────────────────────────────────────────────

  const ASPECT  = 16 / 9;
  const wrapper = document.getElementById('game-wrapper');
  const topBar  = document.getElementById('top-bar');
  const inFSBar = document.getElementById('ingame-top-bar');
  const btnFS         = document.getElementById('btn-fullscreen');
  const btnFSIngame   = document.getElementById('btn-fs-ingame');
  const btnFSPortrait = document.getElementById('btn-fullscreen-portrait');
  const btnPauseIngame = document.getElementById('btn-pause-ingame');

  // ── 遊戲容器維持 16:9 ─────────────────────────
  function resizeGame() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let w, h;
    if (vw / vh > ASPECT) { h = vh; w = h * ASPECT; }
    else                   { w = vw; h = w / ASPECT; }
    wrapper.style.width    = w + 'px';
    wrapper.style.height   = h + 'px';
    wrapper.style.maxWidth  = 'none';
    wrapper.style.maxHeight = 'none';
  }

  // ── 全螢幕狀態判斷 ────────────────────────────
  function isFS() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }

  // ── 進入全螢幕 ────────────────────────────────
  function enterFS() {
    const el  = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen
              || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});
    try {
      if (screen.orientation && screen.orientation.lock)
        screen.orientation.lock('landscape').catch(() => {});
    } catch(e) {}
  }

  // ── 離開全螢幕 ────────────────────────────────
  function exitFS() {
    const fn = document.exitFullscreen || document.webkitExitFullscreen
             || document.mozCancelFullScreen || document.msExitFullscreen;
    if (fn) fn.call(document).catch(() => {});
  }

  // ── 全螢幕切換 ────────────────────────────────
  function toggleFS() { isFS() ? exitFS() : enterFS(); }

  // ── fullscreenchange：更新 UI + 重算尺寸 ──────
  function onFSChange() {
    const fs = isFS();
    // 外部按鈕列：非全螢幕時顯示
    topBar.style.display = fs ? 'none' : 'flex';
    // 遊戲內按鈕列：全螢幕時顯示
    inFSBar.style.display = fs ? 'flex' : 'none';
    // 按鈕文字
    btnFS.textContent       = fs ? '× 離開全螢幕' : '⛶ 全螢幕';
    btnFSIngame.textContent = fs ? '×FS' : '⛶';
    resizeGame();
    checkOrientation();
  }

  ['fullscreenchange','webkitfullscreenchange',
   'mozfullscreenchange','MSFullscreenChange'].forEach(ev =>
    document.addEventListener(ev, onFSChange)
  );

  // 外部按鈕
  btnFS.addEventListener('click', toggleFS);
  btnFSPortrait.addEventListener('click', enterFS);
  // 遊戲內按鈕
  btnFSIngame.addEventListener('click', toggleFS);
  ['touchstart'].forEach(ev =>
    btnFSIngame.addEventListener(ev, e => { e.preventDefault(); toggleFS(); })
  );

  // 暫停按鈕（遊戲內）
  btnPauseIngame.addEventListener('click', () => {
    if (typeof pauseGame === 'function' && typeof resumeGame === 'function') {
      if (window.gameState === 'playing') pauseGame();
      else if (window.gameState === 'paused') resumeGame();
    }
  });
  ['touchstart'].forEach(ev =>
    btnPauseIngame.addEventListener(ev, e => {
      e.preventDefault();
      if (typeof pauseGame === 'function') {
        if (window.gameState === 'playing') pauseGame();
        else if (window.gameState === 'paused') resumeGame();
      }
    })
  );

  // ── 直式遮罩 ──────────────────────────────────
  const portraitMask = document.getElementById('portrait-mask');

  function checkOrientation() {
    const isTouch    = navigator.maxTouchPoints > 0;
    const isPortrait = window.innerHeight > window.innerWidth;
    const fs         = isFS();
    if (portraitMask)
      portraitMask.style.display = (isTouch && isPortrait && !fs) ? 'flex' : 'none';
    // 非全螢幕時才顯示外部按鈕列
    topBar.style.display = fs ? 'none' : 'flex';
  }

  window.addEventListener('resize', () => { resizeGame(); checkOrientation(); });
  window.addEventListener('orientationchange', () => {
    setTimeout(() => { resizeGame(); checkOrientation(); }, 200);
  });

  // ── 初始化 ────────────────────────────────────
  inFSBar.style.display = 'none'; // 預設隱藏遊戲內按鈕列
  resizeGame();
  checkOrientation();
  </script>
</body>
</html>
