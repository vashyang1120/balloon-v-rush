<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>氣球小V：派對島大作戰</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 直式遮罩：手機直拿時顯示 -->
  <div id="portrait-mask">
    <div id="portrait-msg">
      <div style="font-size:48px;margin-bottom:16px;">📱↔️</div>
      <div>請旋轉手機橫向遊玩</div>
      <div style="font-size:13px;opacity:0.6;margin-top:8px;">或點擊下方進入全螢幕</div>
      <button id="btn-fullscreen-portrait" class="fs-btn" style="margin-top:20px;">
        ⛶ 全螢幕遊玩
      </button>
    </div>
  </div>

  <!-- 外部按鈕列（非全螢幕時在 game-wrapper 上方） -->
  <div id="top-bar">
    <button id="btn-pause" class="top-btn">Ⅱ 暫停</button>
    <button id="btn-fullscreen" class="top-btn">⛶ 全螢幕</button>
  </div>

  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- 遊戲內右上角按鈕（全螢幕時顯示，疊在 canvas 上） -->
    <div id="ingame-top-bar">
      <button id="btn-pause-ingame" class="ingame-top-btn">Ⅱ 暫停</button>
      <button id="btn-fs-ingame"    class="ingame-top-btn">× 離開全螢幕</button>
    </div>

    <!-- 暫停 overlay -->
    <div id="pause-overlay">
      <div id="pause-panel">
        <div id="pause-title">⏸ 遊戲暫停</div>
        <div id="pause-actions">
          <button id="btn-resume"        class="pause-btn pause-btn--primary">▶ 繼續遊戲</button>
          <button id="btn-pause-restart" class="pause-btn pause-btn--secondary">↺ 重新開始</button>
        </div>
        <div id="pause-hint">桌機可按 ESC 繼續</div>
      </div>
    </div>

    <!-- 結算畫面 overlay -->
    <div id="result-overlay">
      <div id="result-panel">
        <div id="result-panel-title">關卡結算</div>
        <div id="result-panel-body"></div>
        <div id="result-action-bar">
          <button id="btn-play-again"   class="result-btn result-btn--primary">
            再玩一次<span class="result-btn-sub">Play Again</span>
          </button>
          <button id="btn-guidebook"    class="result-btn result-btn--guide">
            氣球秘笈<span class="result-btn-sub">Guidebook</span>
          </button>
          <button id="btn-result-reset" class="result-btn result-btn--danger">
            清除背包<span class="result-btn-sub">Reset</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 氣球秘笈 overlay -->
    <div id="guidebook-overlay">
      <div id="guidebook-panel">
        <div id="guidebook-header">
          <span id="guidebook-title">📖 氣球秘笈</span>
          <button id="btn-close-guidebook">✕</button>
        </div>
        <div id="craft-message"></div>
        <div id="guidebook-recipe-list"></div>
      </div>
    </div>

    <!-- 手機操作按鈕 -->
    <div id="mobile-controls">
      <div id="ctrl-left-group">
        <button class="ctrl-btn" id="btn-left">◀</button>
        <button class="ctrl-btn" id="btn-right">▶</button>
      </div>
      <div id="ctrl-right-group">
        <button class="ctrl-btn" id="btn-jump">跳</button>
        <button class="ctrl-btn action-btn" id="btn-attack">🎈</button>
      </div>
    </div>
  </div><!-- /#game-wrapper -->

  <script src="main.js"></script>
  <script>
  // ─────────────────────────────────────────────
  //  所有 UI 邏輯在 main.js 載入後執行（DOM 已存在）
  // ─────────────────────────────────────────────

  const ASPECT  = 16 / 9;
  const wrapper = document.getElementById('game-wrapper');

  // ── 遊戲容器維持 16:9 ─────────────────────────
  function resizeGame() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let w, h;
    if (vw / vh > ASPECT) { h = vh; w = h * ASPECT; }
    else                   { w = vw; h = w / ASPECT; }
    wrapper.style.width    = w + 'px';
    wrapper.style.height   = h + 'px';
    wrapper.style.maxWidth  = 'none';
    wrapper.style.maxHeight = 'none';
  }

  // ── 全螢幕狀態 ───────────────────────────────
  function isFS() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }

  function enterFS() {
    const el  = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen
              || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});
    try {
      if (screen.orientation && screen.orientation.lock)
        screen.orientation.lock('landscape').catch(() => {});
    } catch(e) {}
  }

  function exitFS() {
    const fn = document.exitFullscreen || document.webkitExitFullscreen
             || document.mozCancelFullScreen || document.msExitFullscreen;
    if (fn) fn.call(document).catch(() => {});
  }

  function toggleFS() { isFS() ? exitFS() : enterFS(); }

  // ── fullscreenchange：更新按鈕文字 + UI 切換 ──
  function onFSChange() {
    const fs = isFS();

    // 外部按鈕列：非全螢幕時顯示（CSS :fullscreen 也會隱藏）
    document.getElementById('top-bar').style.display = fs ? 'none' : 'flex';
    // 遊戲內按鈕列：全螢幕時顯示
    document.getElementById('ingame-top-bar').style.display = fs ? 'flex' : 'none';

    // 按鈕文字
    document.getElementById('btn-fullscreen').textContent  = fs ? '× 離開全螢幕' : '⛶ 全螢幕';
    document.getElementById('btn-fs-ingame').textContent   = fs ? '× 離開全螢幕' : '⛶ 全螢幕';

    resizeGame();
    checkOrientation();
  }

  ['fullscreenchange','webkitfullscreenchange',
   'mozfullscreenchange','MSFullscreenChange'].forEach(ev =>
    document.addEventListener(ev, onFSChange)
  );

  // ── 全螢幕按鈕事件 ───────────────────────────
  document.getElementById('btn-fullscreen').addEventListener('click', toggleFS);
  document.getElementById('btn-fullscreen-portrait').addEventListener('click', enterFS);
  document.getElementById('btn-fs-ingame').addEventListener('click', toggleFS);
  document.getElementById('btn-fs-ingame').addEventListener('touchstart', e => {
    e.preventDefault(); toggleFS();
  });

  // ── 暫停按鈕事件（外部 + 遊戲內，DOM 已存在才綁定）──
  function handlePauseClick(e) {
    e.preventDefault();
    // pauseGame / resumeGame 由 main.js 定義，此時已載入
    if (typeof pauseGame !== 'function') return;
    if (gameState === 'playing')       pauseGame();
    else if (gameState === 'paused')   resumeGame();
  }

  const btnPauseOuter  = document.getElementById('btn-pause');
  const btnPauseIngame = document.getElementById('btn-pause-ingame');

  btnPauseOuter.addEventListener('click',      handlePauseClick);
  btnPauseOuter.addEventListener('touchstart', handlePauseClick);
  btnPauseIngame.addEventListener('click',      handlePauseClick);
  btnPauseIngame.addEventListener('touchstart', handlePauseClick);

  // ── 結算畫面時隱藏暫停按鈕，離開結算時恢復 ──
  // 這由 main.js 的 triggerClear/GameOver 呼叫 hidePauseBtn()，
  // 由 restart() 呼叫 showPauseBtn()
  window.hidePauseBtn = function() {
    btnPauseOuter.style.display  = 'none';
    btnPauseIngame.style.display = 'none';
  };
  window.showPauseBtn = function() {
    btnPauseOuter.style.display  = '';
    btnPauseIngame.style.display = '';
  };

  // ── 直式遮罩 ──────────────────────────────────
  const portraitMask = document.getElementById('portrait-mask');
  function checkOrientation() {
    const isTouch    = navigator.maxTouchPoints > 0;
    const isPortrait = window.innerHeight > window.innerWidth;
    const fs         = isFS();
    portraitMask.style.display = (isTouch && isPortrait && !fs) ? 'flex' : 'none';
    document.getElementById('top-bar').style.display = fs ? 'none' : 'flex';
  }

  window.addEventListener('resize', () => { resizeGame(); checkOrientation(); });
  window.addEventListener('orientationchange', () => {
    setTimeout(() => { resizeGame(); checkOrientation(); }, 200);
  });

  // ── 初始化 ────────────────────────────────────
  document.getElementById('ingame-top-bar').style.display = 'none';
  resizeGame();
  checkOrientation();
  </script>
</body>
</html>
